[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.12.0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/reviews"
  to = "/reviews/"
  status = 301

[[redirects]]
  from = "/waiver"
  to = "/waiver/"
  status = 301

[[redirects]]
  from = "/tours/brazil-paragliding/"
  to = "/tours/brazil-paragliding-governador-valadares/"
  status = 301

[[redirects]]
  from = "/tour/10-day-paraglide-mexico-package/"
  to = "/tours/10-day-paraglide-mexico-package/"
  status = 301

[[redirects]]
  from = "/sitemap-index.xml"
  to = "/sitemap.xml"
  status = 301

[[redirects]]
  from = "/sitemap-0.xml"
  to = "/sitemap.xml"
  status = 301

[[redirects]]
  from = "/first-day-paragliding-valle-de-bravo/"
  to = "/paragliding-valle-de-bravo/"
  status = 301

[[redirects]]
  from = "/tools/valle-de-bravo-conditions/"
  to = "/valle-de-bravo-conditions/"
  status = 301

# Old WordPress sitemaps -> new sitemap
[[redirects]]
  from = "/category-sitemap.xml"
  to = "/sitemap.xml"
  status = 301

[[redirects]]
  from = "/page-sitemap.xml"
  to = "/sitemap.xml"
  status = 301

[[redirects]]
  from = "/post-sitemap.xml"
  to = "/sitemap.xml"
  status = 301

[[redirects]]
  from = "/product-sitemap.xml"
  to = "/sitemap.xml"
  status = 301

[[redirects]]
  from = "/product_cat-sitemap.xml"
  to = "/sitemap.xml"
  status = 301

[[redirects]]
  from = "/themo_tour-sitemap.xml"
  to = "/sitemap.xml"
  status = 301

# Redirect www to non-www
[[redirects]]
  from = "https://www.airdamien.com/*"
  to = "https://airdamien.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/404"
  status = 404
