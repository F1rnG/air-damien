[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/reviews"
  to = "/reviews/"
  status = 301

[[redirects]]
  from = "/waiver"
  to = "/waiver/"
  status = 301

# Redirect www to non-www
[[redirects]]
  from = "https://www.airdamien.com/*"
  to = "https://airdamien.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/404"
  status = 404
